[extend]
useDefault = true

[[rules]]
id = "plaintext-secret-assignment"
description = "Detect plaintext secret-style assignments outside SOPS-managed files."
regex = '''(?i)(password|passwd|passphrase|secret|token|api[_-]?key|auth[_-]?key|client[_-]?secret|smtp[_-]?password|web[_-]?password|db[_-]?password)[A-Za-z0-9_.-]{0,40}\s*[:=]\s*["']?[A-Za-z0-9_./~!@#$%^&*+=:-]{8,}["']?'''
path = '''(?i)\.(env|ini|cfg|conf|json|jsonc|toml|ya?ml|sh|bash|zsh)$'''
secretGroup = 0

[[rules.allowlists]]
description = "Allow the Traefik runtime secrets bind mount path."
regexes = ['''secrets:/run/secrets:ro''']
paths = ['''^services/traefik/docker-compose\.yml$''']

[[rules]]
id = "non-sops-secret-value"
description = "Require secret-looking entries in secrets/*.yaml to be encrypted with SOPS."
regex = '''(?im)^\s*([A-Za-z0-9_.-]*(password|passwd|passphrase|secret|token|api[_-]?key|auth[_-]?key|client[_-]?secret)[A-Za-z0-9_.-]*)\s*:\s*(?:"|')?(?:[^E\s#\n][^\n#]*|E[^N\n#][^\n#]*|EN[^C\n#][^\n#]*|ENC[^\[\n#][^\n#]*)'''
path = '''^secrets/.*\.ya?ml$'''
secretGroup = 0

[[rules]]
id = "age-private-key"
description = "Age private keys must never be committed."
regex = '''AGE-SECRET-KEY-1[0-9A-Z]+'''
secretGroup = 0
