services:
  app:
    image: "${SOLIDTIME_IMAGE_REPOSITORY}:${SOLIDTIME_IMAGE_TAG}"
    container_name: "${SOLIDTIME_APP_CONTAINER_NAME}"
    restart: unless-stopped
    init: true
    ports:
      - "${SOLIDTIME_LISTEN_ADDRESS}:${SOLIDTIME_LISTEN_PORT}:8000"
    env_file:
      - "${SOLIDTIME_SECRET_ENV_FILE}"
    environment:
      - TZ=${TZ}
      - CONTAINER_MODE=http
      - APP_NAME=${SOLIDTIME_APP_NAME}
      - VITE_APP_NAME=${SOLIDTIME_APP_NAME}
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${SOLIDTIME_APP_URL}
      - APP_FORCE_HTTPS=${SOLIDTIME_FORCE_HTTPS}
      - TRUSTED_PROXIES=${SOLIDTIME_TRUSTED_PROXIES}
      - LOG_CHANNEL=stderr_daily
      - LOG_LEVEL=${SOLIDTIME_LOG_LEVEL}
      - DB_CONNECTION=pgsql
      - DB_HOST=${SOLIDTIME_DB_HOST}
      - DB_PORT=${SOLIDTIME_DB_PORT}
      - DB_SSLMODE=${SOLIDTIME_DB_SSLMODE}
      - DB_DATABASE=${SOLIDTIME_DB_DATABASE}
      - DB_USERNAME=${SOLIDTIME_DB_USERNAME}
      - MAIL_MAILER=smtp
      - MAIL_HOST=${SOLIDTIME_MAIL_HOST}
      - MAIL_PORT=${SOLIDTIME_MAIL_PORT}
      - MAIL_ENCRYPTION=${SOLIDTIME_MAIL_ENCRYPTION}
      - MAIL_FROM_ADDRESS=${SOLIDTIME_MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME=${SOLIDTIME_MAIL_FROM_NAME}
      - MAIL_USERNAME=${SOLIDTIME_MAIL_USERNAME}
      - QUEUE_CONNECTION=database
      - FILESYSTEM_DISK=local
      - PUBLIC_FILESYSTEM_DISK=public
      - GOTENBERG_URL=http://gotenberg:3000
      - APP_ENABLE_REGISTRATION=${SOLIDTIME_ENABLE_REGISTRATION}
    volumes:
      - "${SOLIDTIME_DATA_DIR}/storage:/var/www/html/storage"
      - "${SOLIDTIME_DATA_DIR}/logs:/var/www/html/storage/logs"
      - "${SOLIDTIME_DATA_DIR}/app:/var/www/html/storage/app"
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - http://localhost:8000/health-check/up
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s
    depends_on:
      gotenberg:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${SOLIDTIME_NETWORK}"
      - "traefik.http.routers.solidtime.rule=Host(`${SOLIDTIME_HOSTNAME}`)"
      - "traefik.http.services.solidtime.loadbalancer.server.port=8000"
      - "traefik.http.routers.solidtime.entrypoints=${SOLIDTIME_ENTRYPOINTS}"
      - "traefik.http.routers.solidtime.tls=${SOLIDTIME_TLS}"
    networks:
      - traefik
      - internal

  scheduler:
    image: "${SOLIDTIME_IMAGE_REPOSITORY}:${SOLIDTIME_IMAGE_TAG}"
    container_name: "${SOLIDTIME_SCHEDULER_CONTAINER_NAME}"
    restart: unless-stopped
    init: true
    env_file:
      - "${SOLIDTIME_SECRET_ENV_FILE}"
    environment:
      - TZ=${TZ}
      - CONTAINER_MODE=scheduler
      - APP_NAME=${SOLIDTIME_APP_NAME}
      - VITE_APP_NAME=${SOLIDTIME_APP_NAME}
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${SOLIDTIME_APP_URL}
      - APP_FORCE_HTTPS=${SOLIDTIME_FORCE_HTTPS}
      - TRUSTED_PROXIES=${SOLIDTIME_TRUSTED_PROXIES}
      - LOG_CHANNEL=stderr_daily
      - LOG_LEVEL=${SOLIDTIME_LOG_LEVEL}
      - DB_CONNECTION=pgsql
      - DB_HOST=${SOLIDTIME_DB_HOST}
      - DB_PORT=${SOLIDTIME_DB_PORT}
      - DB_SSLMODE=${SOLIDTIME_DB_SSLMODE}
      - DB_DATABASE=${SOLIDTIME_DB_DATABASE}
      - DB_USERNAME=${SOLIDTIME_DB_USERNAME}
      - MAIL_MAILER=smtp
      - MAIL_HOST=${SOLIDTIME_MAIL_HOST}
      - MAIL_PORT=${SOLIDTIME_MAIL_PORT}
      - MAIL_ENCRYPTION=${SOLIDTIME_MAIL_ENCRYPTION}
      - MAIL_FROM_ADDRESS=${SOLIDTIME_MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME=${SOLIDTIME_MAIL_FROM_NAME}
      - MAIL_USERNAME=${SOLIDTIME_MAIL_USERNAME}
      - QUEUE_CONNECTION=database
      - FILESYSTEM_DISK=local
      - PUBLIC_FILESYSTEM_DISK=public
      - GOTENBERG_URL=http://gotenberg:3000
      - APP_ENABLE_REGISTRATION=${SOLIDTIME_ENABLE_REGISTRATION}
    volumes:
      - "${SOLIDTIME_DATA_DIR}/storage:/var/www/html/storage"
      - "${SOLIDTIME_DATA_DIR}/logs:/var/www/html/storage/logs"
      - "${SOLIDTIME_DATA_DIR}/app:/var/www/html/storage/app"
    healthcheck:
      test:
        - CMD
        - healthcheck
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s
    networks:
      - internal

  queue:
    image: "${SOLIDTIME_IMAGE_REPOSITORY}:${SOLIDTIME_IMAGE_TAG}"
    container_name: "${SOLIDTIME_QUEUE_CONTAINER_NAME}"
    restart: unless-stopped
    init: true
    env_file:
      - "${SOLIDTIME_SECRET_ENV_FILE}"
    environment:
      - TZ=${TZ}
      - CONTAINER_MODE=worker
      - WORKER_COMMAND=php /var/www/html/artisan queue:work
      - APP_NAME=${SOLIDTIME_APP_NAME}
      - VITE_APP_NAME=${SOLIDTIME_APP_NAME}
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${SOLIDTIME_APP_URL}
      - APP_FORCE_HTTPS=${SOLIDTIME_FORCE_HTTPS}
      - TRUSTED_PROXIES=${SOLIDTIME_TRUSTED_PROXIES}
      - LOG_CHANNEL=stderr_daily
      - LOG_LEVEL=${SOLIDTIME_LOG_LEVEL}
      - DB_CONNECTION=pgsql
      - DB_HOST=${SOLIDTIME_DB_HOST}
      - DB_PORT=${SOLIDTIME_DB_PORT}
      - DB_SSLMODE=${SOLIDTIME_DB_SSLMODE}
      - DB_DATABASE=${SOLIDTIME_DB_DATABASE}
      - DB_USERNAME=${SOLIDTIME_DB_USERNAME}
      - MAIL_MAILER=smtp
      - MAIL_HOST=${SOLIDTIME_MAIL_HOST}
      - MAIL_PORT=${SOLIDTIME_MAIL_PORT}
      - MAIL_ENCRYPTION=${SOLIDTIME_MAIL_ENCRYPTION}
      - MAIL_FROM_ADDRESS=${SOLIDTIME_MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME=${SOLIDTIME_MAIL_FROM_NAME}
      - MAIL_USERNAME=${SOLIDTIME_MAIL_USERNAME}
      - QUEUE_CONNECTION=database
      - FILESYSTEM_DISK=local
      - PUBLIC_FILESYSTEM_DISK=public
      - GOTENBERG_URL=http://gotenberg:3000
      - APP_ENABLE_REGISTRATION=${SOLIDTIME_ENABLE_REGISTRATION}
    volumes:
      - "${SOLIDTIME_DATA_DIR}/storage:/var/www/html/storage"
      - "${SOLIDTIME_DATA_DIR}/logs:/var/www/html/storage/logs"
      - "${SOLIDTIME_DATA_DIR}/app:/var/www/html/storage/app"
    healthcheck:
      test:
        - CMD
        - healthcheck
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s
    networks:
      - internal

  gotenberg:
    image: "${SOLIDTIME_GOTENBERG_IMAGE_REPOSITORY}:${SOLIDTIME_GOTENBERG_IMAGE_TAG}"
    container_name: "${SOLIDTIME_GOTENBERG_CONTAINER_NAME}"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - --silent
        - --fail
        - http://localhost:3000/health
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 30s
    networks:
      - internal

networks:
  traefik:
    external: true
    name: ${SOLIDTIME_NETWORK}
  internal:
