services:
  tailscale:
    image: ${TAILSCALE_IMAGE_REPOSITORY}:${TAILSCALE_IMAGE_TAG}
    container_name: ${TAILSCALE_CONTAINER_NAME}
    hostname: ${TAILSCALE_HOSTNAME}
    network_mode: host
    restart: unless-stopped

    cap_add:
      - NET_ADMIN
      - SYS_MODULE

    devices:
      - /dev/net/tun:/dev/net/tun

    volumes:
      - ${TAILSCALE_STATE_DIR}:/var/lib/tailscale
      - /var/run/tailscale:/var/run/tailscale

    env_file:
      - ${TAILSCALE_ENV_FILE}

    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SOCKET=${TAILSCALE_SOCKET}
      - TS_HOSTNAME=${TAILSCALE_HOSTNAME}
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=${TAILSCALE_EXTRA_ARGS}
      - TS_DEBUG_FIREWALL_MODE=${TAILSCALE_FIREWALL_MODE:-}

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
