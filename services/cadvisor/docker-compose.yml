services:
  cadvisor:
    image: "${CADVISOR_IMAGE_REPOSITORY}:${CADVISOR_IMAGE_TAG}"
    container_name: "${CADVISOR_CONTAINER_NAME}"
    restart: unless-stopped
    privileged: true
    entrypoint:
      - /bin/sh
      - -c
      - |
        args="--housekeeping_interval=${CADVISOR_HOUSEKEEPING_INTERVAL}"
        disable_metrics="${CADVISOR_DISABLE_METRICS}"
        if [ -n "$$disable_metrics" ]; then
          args="$$args --disable_metrics=$$disable_metrics"
        fi
        exec /usr/bin/cadvisor $$args
    ports:
      - "${CADVISOR_LISTEN_ADDRESS}:${CADVISOR_LISTEN_PORT}:8080"
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:rw"
      - "/sys:/sys:ro"
      - "${CADVISOR_DOCKER_DATA_ROOT}:${CADVISOR_DOCKER_DATA_ROOT}:ro"
      - "/dev/disk:/dev/disk:ro"
