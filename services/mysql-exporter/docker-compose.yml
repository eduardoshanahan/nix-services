services:
  mysql-exporter:
    image: ${MYSQL_EXPORTER_IMAGE_REPOSITORY}:${MYSQL_EXPORTER_IMAGE_TAG}
    container_name: ${MYSQL_EXPORTER_CONTAINER_NAME}
    restart: unless-stopped

    environment:
      - TZ

    volumes:
      - ${MYSQL_EXPORTER_MYCNF_PATH}:/etc/mysql-exporter.my.cnf:ro

    command:
      - --config.my-cnf=/etc/mysql-exporter.my.cnf
      - --mysqld.address=${MYSQL_EXPORTER_MYSQL_HOST}:${MYSQL_EXPORTER_MYSQL_PORT}

    ports:
      - "${MYSQL_EXPORTER_PORT}:9104"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - traefik

networks:
  traefik:
    external: true
    name: ${MYSQL_EXPORTER_NETWORK}
