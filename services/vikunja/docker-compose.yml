services:
  vikunja:
    image: ${VIKUNJA_IMAGE_REPOSITORY}:${VIKUNJA_IMAGE_TAG}
    container_name: ${VIKUNJA_CONTAINER_NAME}
    restart: unless-stopped
    init: true
    mem_limit: 512m
    pids_limit: 256
    cpus: "1.0"

    expose:
      - "3456"

    env_file:
      - ${VIKUNJA_DATABASE_ENV_FILE}
      - ${VIKUNJA_MAILER_ENV_FILE}

    environment:
      - TZ
      - SSL_CERT_FILE=/etc/vikunja/homelab-root-ca.crt
      - HOME=/app/vikunja/files
      - XDG_CACHE_HOME=/app/vikunja/files/.cache
      - VIKUNJA_SERVICE_PUBLICURL=${VIKUNJA_SERVICE_PUBLICURL}
      - VIKUNJA_SERVICE_ENABLEREGISTRATION=${VIKUNJA_SERVICE_ENABLEREGISTRATION}
      - VIKUNJA_METRICS_ENABLED=${VIKUNJA_METRICS_ENABLED}
      - VIKUNJA_DATABASE_TYPE=${VIKUNJA_DATABASE_TYPE}
      - VIKUNJA_DATABASE_PATH=${VIKUNJA_DATABASE_PATH}
      - VIKUNJA_DATABASE_HOST=${VIKUNJA_DATABASE_HOST}
      - VIKUNJA_DATABASE_DATABASE=${VIKUNJA_DATABASE_DATABASE}
      - VIKUNJA_DATABASE_USER=${VIKUNJA_DATABASE_USER}
      - VIKUNJA_DATABASE_SSLMODE=${VIKUNJA_DATABASE_SSLMODE}
      - VIKUNJA_MAILER_ENABLED=${VIKUNJA_MAILER_ENABLED}
      - VIKUNJA_MAILER_HOST=${VIKUNJA_MAILER_HOST}
      - VIKUNJA_MAILER_PORT=${VIKUNJA_MAILER_PORT}
      - VIKUNJA_MAILER_AUTHTYPE=${VIKUNJA_MAILER_AUTHTYPE}
      - VIKUNJA_MAILER_USERNAME=${VIKUNJA_MAILER_USERNAME}
      - VIKUNJA_MAILER_SKIPTLSVERIFY=${VIKUNJA_MAILER_SKIPTLSVERIFY}
      - VIKUNJA_MAILER_FROMEMAIL=${VIKUNJA_MAILER_FROMEMAIL}
      - VIKUNJA_MAILER_QUEUELENGTH=${VIKUNJA_MAILER_QUEUELENGTH}
      - VIKUNJA_MAILER_QUEUETIMEOUT=${VIKUNJA_MAILER_QUEUETIMEOUT}
      - VIKUNJA_MAILER_FORCESSL=${VIKUNJA_MAILER_FORCESSL}
      - VIKUNJA_FILES_BASE_PATH=/app/vikunja/files

    volumes:
      - "${VIKUNJA_DATA_DIR}:/app/vikunja/files"
      - "/etc/vikunja/config.yml:/etc/vikunja/config.yml:ro"
      - "/etc/ssl/certs/homelab-root-ca.crt:/etc/vikunja/homelab-root-ca.crt:ro"
      - "${VIKUNJA_OIDC_CLIENT_ID_FILE}:/run/secrets/vikunja-oidc-client-id:ro"
      - "${VIKUNJA_OIDC_CLIENT_SECRET_FILE}:/run/secrets/vikunja-oidc-client-secret:ro"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${VIKUNJA_NETWORK}"
      - "traefik.http.routers.vikunja.rule=Host(`${VIKUNJA_HOSTNAME}`)"
      - "traefik.http.services.vikunja.loadbalancer.server.port=3456"
      - "traefik.http.routers.vikunja.entrypoints=${VIKUNJA_ENTRYPOINTS}"
      - "traefik.http.routers.vikunja.tls=${VIKUNJA_TLS}"

    networks:
      - traefik

networks:
  traefik:
    external: true
    name: ${VIKUNJA_NETWORK}
