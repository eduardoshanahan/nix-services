services:
  diagrams-net:
    image: ${DIAGRAMS_NET_IMAGE_REPOSITORY}:${DIAGRAMS_NET_IMAGE_TAG}
    container_name: ${DIAGRAMS_NET_CONTAINER_NAME}
    restart: unless-stopped
    init: true

    user: "1000:1000"
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    mem_limit: 512m
    pids_limit: 256
    cpus: "1.0"

    expose:
      - "8080"

    environment:
      - TZ

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

    volumes:
      - "/var/lib/diagrams-net:/data:rw"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${DIAGRAMS_NET_NETWORK}"
      - "traefik.http.routers.diagrams-net.rule=Host(`${DIAGRAMS_NET_HOSTNAME}`)"
      - "traefik.http.services.diagrams-net.loadbalancer.server.port=8080"
      - "traefik.http.routers.diagrams-net.entrypoints=${DIAGRAMS_NET_ENTRYPOINTS}"
      - "traefik.http.routers.diagrams-net.tls=${DIAGRAMS_NET_TLS}"

    networks:
      - traefik

networks:
  traefik:
    external: true
    name: ${DIAGRAMS_NET_NETWORK}
