services:
  timetagger:
    image: ${TIMETAGGER_IMAGE_REPOSITORY}:${TIMETAGGER_IMAGE_TAG}
    container_name: ${TIMETAGGER_CONTAINER_NAME}
    restart: unless-stopped
    init: true

    expose:
      - "80"

    environment:
      - TIMETAGGER_BIND=0.0.0.0:80
      - TIMETAGGER_DATADIR=/root/_timetagger
      - TIMETAGGER_LOG_LEVEL=${TIMETAGGER_LOG_LEVEL}
      - TIMETAGGER_PROXY_AUTH_ENABLED=${TIMETAGGER_PROXY_AUTH_ENABLED}
      - TIMETAGGER_PROXY_AUTH_TRUSTED=${TIMETAGGER_PROXY_AUTH_TRUSTED}
      - TIMETAGGER_PROXY_AUTH_HEADER=${TIMETAGGER_PROXY_AUTH_HEADER}

    volumes:
      - "${TIMETAGGER_DATA_DIR}:/root/_timetagger:rw"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TIMETAGGER_NETWORK}"
      - "traefik.http.routers.timetagger.rule=Host(`${TIMETAGGER_HOSTNAME}`)"
      - "traefik.http.services.timetagger.loadbalancer.server.port=80"
      - "traefik.http.routers.timetagger.entrypoints=${TIMETAGGER_ENTRYPOINTS}"
      - "traefik.http.routers.timetagger.tls=${TIMETAGGER_TLS}"
      - "traefik.http.routers.timetagger.middlewares=${TIMETAGGER_ROUTER_MIDDLEWARES}"
      - "traefik.http.middlewares.timetagger-auth.forwardauth.address=${TIMETAGGER_AUTHENTIK_FORWARD_AUTH_ADDRESS}"
      - "traefik.http.middlewares.timetagger-auth.forwardauth.trustForwardHeader=${TIMETAGGER_AUTHENTIK_FORWARD_AUTH_TRUST_FORWARD_HEADER}"
      - "traefik.http.middlewares.timetagger-auth.forwardauth.authResponseHeaders=${TIMETAGGER_AUTHENTIK_FORWARD_AUTH_RESPONSE_HEADERS}"

    networks:
      - traefik

networks:
  traefik:
    external: true
    name: ${TIMETAGGER_NETWORK}
