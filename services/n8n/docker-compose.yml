services:
  n8n:
    image: ${N8N_IMAGE_REPOSITORY}:${N8N_IMAGE_TAG}
    container_name: ${N8N_CONTAINER_NAME}
    restart: unless-stopped
    init: true
    mem_limit: 768m
    pids_limit: 256
    cpus: "1.5"

    expose:
      - "5678"

    env_file:
      - ${N8N_RUNTIME_ENV_FILE}

    environment:
      - TZ=${TZ}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_PROXY_HOPS=${N8N_PROXY_HOPS}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE}
      - N8N_RUNNERS_ENABLED=${N8N_RUNNERS_ENABLED}
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${N8N_DB_HOST}
      - DB_POSTGRESDB_PORT=${N8N_DB_PORT}
      - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME}
      - DB_POSTGRESDB_USER=${N8N_DB_USER}

    volumes:
      - "${N8N_DATA_DIR}:/home/node/.n8n"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${N8N_NETWORK}"
      - "traefik.http.routers.n8n.rule=Host(`${N8N_HOST}`)"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "traefik.http.routers.n8n.entrypoints=${N8N_ENTRYPOINTS}"
      - "traefik.http.routers.n8n.tls=${N8N_TLS}"

    networks:
      - traefik

networks:
  traefik:
    external: true
    name: ${N8N_NETWORK}
