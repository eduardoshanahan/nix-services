services:
  lazylibrarian:
    image: ${LAZYLIBRARIAN_IMAGE_REPOSITORY}:${LAZYLIBRARIAN_IMAGE_TAG}
    container_name: ${LAZYLIBRARIAN_CONTAINER_NAME}
    restart: unless-stopped
    mem_limit: 1024m
    pids_limit: 512
    cpus: "2.0"

    expose:
      - "5299"

    environment:
      - TZ=${TZ}
      - PUID=${LAZYLIBRARIAN_PUID}
      - PGID=${LAZYLIBRARIAN_PGID}
      - UMASK=002
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates-with-homelab.pem
      - CURL_CA_BUNDLE=/etc/ssl/certs/ca-certificates-with-homelab.pem
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates-with-homelab.pem

    volumes:
      - "${LAZYLIBRARIAN_DATA_DIR}:/config"
      - "${LAZYLIBRARIAN_DOWNLOADS_DIR}:${LAZYLIBRARIAN_DOWNLOADS_MOUNT_PATH}"
      - "${LAZYLIBRARIAN_BOOKS_DIR}:${LAZYLIBRARIAN_BOOKS_MOUNT_PATH}"
      - "${LAZYLIBRARIAN_CWA_INGEST_DIR}:${LAZYLIBRARIAN_CWA_INGEST_MOUNT_PATH}"
      - "/etc/ssl/certs/ca-certificates-with-homelab.pem:/etc/ssl/certs/ca-certificates-with-homelab.pem:ro"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${LAZYLIBRARIAN_NETWORK}"
      - "traefik.http.routers.lazylibrarian.rule=Host(`${LAZYLIBRARIAN_HOST}`)"
      - "traefik.http.services.lazylibrarian.loadbalancer.server.port=5299"
      - "traefik.http.routers.lazylibrarian.entrypoints=${LAZYLIBRARIAN_ENTRYPOINTS}"
      - "traefik.http.routers.lazylibrarian.tls=${LAZYLIBRARIAN_TLS}"

    networks:
      - traefik

networks:
  traefik:
    external: true
    name: ${LAZYLIBRARIAN_NETWORK}
