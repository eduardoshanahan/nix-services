global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "nodes"
    static_configs:
      - targets:
          - "rpi-box-01.<internal-domain>:9100"
          - "rpi-box-02.<internal-domain>:9100"
          - "rpi-box-03.<internal-domain>:9100"

  - job_name: "loki"
    static_configs:
      - targets: ["loki.<internal-domain>:3100"]

