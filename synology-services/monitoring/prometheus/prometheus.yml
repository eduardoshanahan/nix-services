global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "nodes"
    static_configs:
      - targets:
          - "192.168.1.58:9100"
          - "192.168.1.59:9100"
          - "192.168.1.10:9100"

  - job_name: "loki"
    static_configs:
      - targets: ["192.168.1.10:3100"]
